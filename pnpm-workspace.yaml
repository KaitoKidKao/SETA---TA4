packages:
  - "apps/*"
  - "packages/*"
  - "sdks/*"
overrides:
  # @better-auth/core@1.6.11 peer-requires better-call@1.3.5, but @better-auth/cli@1.4.21
  # (no 1.6.x published) drags in better-call@1.1.8, which pnpm mis-links into core@1.6.11
  # → "kAPIErrorHeaderSymbol" missing export crash at server boot. Force a single version.
  better-call: 1.3.5
allowBuilds:
  '@node-rs/argon2': true
  '@prisma/client': true
  better-sqlite3: true
  cpu-features: true
  esbuild: true
  lefthook: true
  msw: true
  protobufjs: true
  ssh2: true
  tesseract.js: true
minimumReleaseAgeExclude:
  - '@aws-sdk/*'
  - '@mastra/*'
  - '@assistant-ui/*'
  - '@turbo/*'
  - assistant-stream
  - nodemailer
  - react-email
  - turbo
